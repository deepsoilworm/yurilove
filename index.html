<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret</title>
  <style>
    @font-face {
      font-family: 'NeoDGM';
      src: url('neodgm.woff') format('woff');
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #FF007F 0%, #FF1493 40%, #DA00FF 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'NeoDGM', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        radial-gradient(2px 2px at 20% 30%, #fff 100%, transparent),
        radial-gradient(2px 2px at 40% 70%, #ffe4f3 100%, transparent),
        radial-gradient(2px 2px at 60% 20%, #fff 100%, transparent),
        radial-gradient(2px 2px at 80% 60%, #ffe4f3 100%, transparent),
        radial-gradient(1px 1px at 10% 80%, #fff 100%, transparent),
        radial-gradient(1px 1px at 70% 40%, #fff 100%, transparent),
        radial-gradient(1px 1px at 90% 10%, #ffe4f3 100%, transparent),
        radial-gradient(1px 1px at 50% 90%, #fff 100%, transparent);
      animation: twinkle 3s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes twinkle {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .container {
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .question {
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      color: #FFFF00;
      text-shadow:
        3px 3px 0px #FF007F,
        -1px -1px 0px #00FFFF,
        0 0 20px rgba(255, 255, 0, 0.5);
      margin-bottom: 2rem;
      line-height: 2;
      text-align: center;
    }

    .input-wrap {
      border: 4px solid #FFFF00;
      border-radius: 4px;
      box-shadow: 0 0 15px rgba(255, 255, 0, 0.3);
      background: rgba(255, 255, 255, 0.95);
      padding: 0;
      display: inline-block;
    }


    .input-wrap:focus-within {
      box-shadow: 0 0 15px rgba(255, 255, 0, 0.6), 0 0 30px rgba(0, 255, 255, 0.3);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 14px 24px;
      pointer-events: none;
    }

    .dot {
      width: clamp(14px, 3vw, 20px);
      height: clamp(14px, 3vw, 20px);
      border-radius: 50%;
      border: 3px solid #FF007F;
      background: transparent;
      transition: background 0.15s, transform 0.15s;
    }

    .dot.filled {
      background: #FF007F;
      transform: scale(1.15);
    }

    .input-wrap input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .input-wrap {
      position: relative;
    }

    .shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="question">
      세젤예 여신님의<br>생일은?
    </p>
    <div class="input-wrap">
      <div class="dots" id="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <input type="tel" id="answer" maxlength="4" autofocus autocomplete="off">
    </div>
  </div>

  <script>
    const input = document.getElementById('answer');
    const dots = document.querySelectorAll('.dot');

    input.addEventListener('input', function () {
      const len = this.value.length;
      dots.forEach((d, i) => d.classList.toggle('filled', i < len));

      if (len === 4) {
        if (this.value === '0325') {
          window.location.href = 'birthday.html';
        } else {
          this.parentElement.classList.add('shake');
          setTimeout(() => {
            this.parentElement.classList.remove('shake');
            this.value = '';
            dots.forEach(d => d.classList.remove('filled'));
          }, 400);
        }
      }
    });

    // 화면 어디를 터치해도 입력 포커스
    document.addEventListener('click', () => input.focus());
  </script>
</body>
</html>
