<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>YURI BIRTHDAY</title>
  <link href="https://unpkg.com/nes.css@2.3.0/css/nes.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/galmuri/dist/Galmuri11.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FF007F;
      background: linear-gradient(180deg, #DA00FF 0%, #FF007F 50%, #FF1493 100%);
      font-family: 'Galmuri11', monospace;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      user-select: none;
      touch-action: none;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        radial-gradient(2px 2px at 15% 25%, #fff 100%, transparent),
        radial-gradient(2px 2px at 35% 65%, #FFFF00 100%, transparent),
        radial-gradient(2px 2px at 55% 15%, #00FFFF 100%, transparent),
        radial-gradient(2px 2px at 75% 55%, #fff 100%, transparent),
        radial-gradient(1px 1px at 5% 75%, #FFFF00 100%, transparent),
        radial-gradient(1px 1px at 65% 35%, #00FFFF 100%, transparent),
        radial-gradient(1px 1px at 85% 85%, #fff 100%, transparent),
        radial-gradient(1px 1px at 45% 95%, #FFFF00 100%, transparent);
      animation: twinkle 2s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    #game-area {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* 플레이어 */
    #player {
      position: absolute;
      bottom: 15px;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }

    #player-char {
      font-size: clamp(1.8rem, 6vw, 3rem);
      filter: drop-shadow(0 0 10px rgba(255, 255, 0, 0.6));
      animation: playerBounce 0.5s ease-in-out infinite alternate;
      white-space: nowrap;
    }

    #player-name {
      font-size: clamp(0.45rem, 1.5vw, 0.6rem);
      color: #FFFF00;
      text-shadow: 1px 1px 0 #FF007F;
      margin-top: 2px;
    }

    @keyframes playerBounce {
      from { transform: translateY(0); }
      to { transform: translateY(-5px); }
    }

    /* 떨어지는 텍스트 */
    .falling-text {
      position: absolute;
      white-space: nowrap;
      font-weight: bold;
      z-index: 5;
      pointer-events: none;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.5));
    }

    .falling-text.c0 { color: #FFFF00; text-shadow: 2px 2px 0 #FF007F; }
    .falling-text.c1 { color: #00FFFF; text-shadow: 2px 2px 0 #DA00FF; }
    .falling-text.c2 { color: #FF69B4; text-shadow: 2px 2px 0 #FFFF00; }
    .falling-text.c3 { color: #fff; text-shadow: 2px 2px 0 #FF007F, 0 0 10px #00FFFF; }
    .falling-text.c4 { color: #FFD700; text-shadow: 2px 2px 0 #FF1493; }
    .falling-text.c5 { color: #7FFF00; text-shadow: 2px 2px 0 #DA00FF; }

    /* 게이지 */
    #gauge-container {
      position: fixed;
      right: clamp(8px, 2vw, 20px);
      top: 50%;
      transform: translateY(-50%);
      width: clamp(35px, 6vw, 55px);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #gauge-label {
      color: #FFFF00;
      font-size: clamp(0.5rem, 1.5vw, 0.7rem);
      text-shadow: 1px 1px 0 #FF007F;
      margin-bottom: 4px;
    }

    #gauge-bar-bg {
      width: clamp(24px, 4vw, 38px);
      height: clamp(150px, 35vh, 250px);
      background: rgba(0, 0, 0, 0.3);
      border: 3px solid #FFFF00;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      image-rendering: pixelated;
      box-shadow: 0 0 10px rgba(255, 255, 0, 0.4);
    }

    #gauge-bar-fill {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #FF007F, #FF69B4, #FFFF00);
      transition: height 0.3s ease;
    }

    #gauge-bar-fill.pulse {
      animation: gaugePulse 0.3s ease;
    }

    @keyframes gaugePulse {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.8); }
      100% { filter: brightness(1); }
    }

    #gauge-percent {
      color: #00FFFF;
      font-size: clamp(0.55rem, 1.5vw, 0.8rem);
      text-shadow: 1px 1px 0 #DA00FF;
      margin-top: 6px;
    }

    #gauge-heart {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      margin-top: 4px;
      animation: heartbeat 0.5s infinite alternate;
    }

    @keyframes heartbeat {
      from { transform: scale(1); }
      to { transform: scale(1.3); }
    }

    /* 점수 */
    #score-display {
      position: fixed;
      left: clamp(8px, 2vw, 20px);
      top: clamp(8px, 2vw, 20px);
      z-index: 20;
      color: #FFFF00;
      font-size: clamp(0.7rem, 2vw, 1rem);
      text-shadow: 2px 2px 0 #FF007F, 0 0 10px rgba(255, 255, 0, 0.5);
    }

    #combo {
      position: fixed;
      left: clamp(8px, 2vw, 20px);
      top: clamp(30px, 5vw, 50px);
      z-index: 20;
      color: #00FFFF;
      font-size: clamp(0.6rem, 1.5vw, 0.8rem);
      text-shadow: 1px 1px 0 #DA00FF;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #combo.show {
      opacity: 1;
      animation: comboShake 0.3s ease;
    }

    @keyframes comboShake {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    /* 엔딩 */
    #ending-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(218, 0, 255, 0.9) 0%, rgba(255, 0, 127, 0.95) 100%);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #ending-overlay.show {
      display: flex;
      animation: overlayIn 0.6s ease;
    }

    @keyframes overlayIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #ending-text {
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      color: #FFFF00;
      text-shadow: 4px 4px 0 #FF007F, -2px -2px 0 #00FFFF, 0 0 30px rgba(255, 255, 0, 0.6);
      text-align: center;
      line-height: 2.2;
      animation: popIn 0.8s ease forwards;
      z-index: 110;
      padding: 0 1rem;
    }

    @keyframes popIn {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .ending-heart {
      position: fixed;
      z-index: 105;
      pointer-events: none;
      animation: heartFall linear forwards;
    }

    @keyframes heartFall {
      0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(0.5); }
    }

    .explode-heart {
      position: fixed;
      z-index: 108;
      pointer-events: none;
      animation: explode 1.2s ease-out forwards;
    }

    @keyframes explode {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--ex), var(--ey)) scale(0.2); }
    }

    .catch-effect {
      position: absolute;
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      color: #FFFF00;
      text-shadow: 1px 1px 0 #FF007F;
      pointer-events: none;
      z-index: 15;
      animation: floatUp 0.8s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
    }

    .catch-flash {
      position: absolute;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,0,0.6) 0%, transparent 70%);
      pointer-events: none;
      z-index: 14;
      animation: flash 0.4s ease-out forwards;
    }

    @keyframes flash {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    #start-hint {
      position: fixed;
      bottom: clamp(70px, 15vh, 100px);
      left: 50%;
      transform: translateX(-50%);
      color: #FFFF00;
      font-size: clamp(0.7rem, 2.5vw, 1rem);
      text-shadow: 2px 2px 0 #FF007F, 0 0 15px rgba(255, 255, 0, 0.5);
      z-index: 20;
      animation: blink 0.8s infinite;
      white-space: nowrap;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div id="game-area">
    <div id="player">
      <div id="player-char">(*^-^*)</div>
      <div id="player-name">YURI</div>
    </div>
  </div>

  <div id="score-display">CATCH: <span id="score">0</span></div>
  <div id="combo"></div>

  <div id="gauge-container">
    <div id="gauge-label">LOVE</div>
    <div id="gauge-bar-bg">
      <div id="gauge-bar-fill"></div>
    </div>
    <div id="gauge-percent">0%</div>
    <div id="gauge-heart">&#10084;</div>
  </div>

  <div id="start-hint">&#9654; 마우스를 움직여서 사랑을 받아내!</div>

  <div id="ending-overlay">
    <div id="ending-text"></div>
  </div>

  <script>
    // === 8bit 사운드 엔진 ===
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let actx = null;

    function initAudio() {
      if (!actx) actx = new AudioCtx();
      if (actx.state === 'suspended') actx.resume();
    }

    function playTone(freq, duration, type = 'square', vol = 0.15, delay = 0) {
      if (!actx) return;
      const t = actx.currentTime + delay;
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.connect(gain);
      gain.connect(actx.destination);
      osc.start(t);
      osc.stop(t + duration);
    }

    // 캐치 효과음 - 귀여운 "딩!"
    function sfxCatch() {
      playTone(880, 0.1, 'square', 0.12);
      playTone(1175, 0.15, 'square', 0.1, 0.05);
    }

    // 콤보 효과음 - 올라가는 음
    function sfxCombo(count) {
      const base = 600 + count * 80;
      playTone(base, 0.08, 'square', 0.1);
      playTone(base * 1.25, 0.08, 'square', 0.1, 0.06);
      playTone(base * 1.5, 0.12, 'square', 0.12, 0.12);
    }

    // 폭발 효과음
    function sfxExplode() {
      // 상승 글리산도
      for (let i = 0; i < 8; i++) {
        playTone(400 + i * 150, 0.12, 'square', 0.1, i * 0.04);
      }
      // 큰 팡!
      playTone(1800, 0.3, 'sawtooth', 0.15, 0.32);
      playTone(2200, 0.2, 'square', 0.1, 0.35);
      // 노이즈 느낌
      playTone(100, 0.4, 'sawtooth', 0.08, 0.3);
    }

    // 엔딩 멜로디 - 생일 축하 느낌의 8bit 멜로디
    function sfxEnding() {
      const melody = [
        [523, 0.2], [523, 0.2], [587, 0.4], [523, 0.4], [698, 0.4], [659, 0.6],
        [523, 0.2], [523, 0.2], [587, 0.4], [523, 0.4], [784, 0.4], [698, 0.6],
        [523, 0.2], [523, 0.2], [1047, 0.4], [880, 0.4], [698, 0.4], [659, 0.4], [587, 0.6],
      ];
      let t = 0;
      melody.forEach(([freq, dur]) => {
        playTone(freq, dur * 0.9, 'square', 0.12, t);
        // 하모니
        playTone(freq * 0.5, dur * 0.9, 'triangle', 0.06, t);
        t += dur;
      });
    }

    // BGM - 간단한 루프 멜로디
    let bgmTimer = null;
    function startBGM() {
      if (!actx) return;
      const notes = [
        [392, 0.25], [440, 0.25], [523, 0.25], [440, 0.25],
        [523, 0.25], [587, 0.25], [523, 0.25], [440, 0.25],
        [392, 0.25], [349, 0.25], [392, 0.25], [440, 0.5],
        [523, 0.25], [587, 0.25], [659, 0.25], [587, 0.25],
        [523, 0.25], [440, 0.25], [392, 0.25], [440, 0.5],
      ];
      let totalDur = notes.reduce((s, n) => s + n[1], 0);

      function playLoop() {
        if (gameOver) return;
        let t = 0;
        notes.forEach(([freq, dur]) => {
          playTone(freq, dur * 0.8, 'triangle', 0.05, t);
          // 약한 베이스
          playTone(freq * 0.25, dur * 0.8, 'sine', 0.03, t);
          t += dur;
        });
        bgmTimer = setTimeout(playLoop, totalDur * 1000);
      }
      playLoop();
    }

    function stopBGM() {
      clearTimeout(bgmTimer);
    }

    const texts = [
      '유리사랑해', '사랑해', '유리 여신님', '짱예뻐',
      '0325', '1997', '생일축하해', 'LOVE', '최고',
      '세상에서 제일 예뻐', '심쿵', '유리유리',
      '내 사람', '보고싶어', '좋아해', '사랑',
      '영원히 사랑해', '유리 천사', '사랑둥이',
      '충만', '빛과 소금', '19970325'
    ];

    const hearts = ['&#10084;','&#128150;','&#128151;','&#128152;','&#128153;','&#128155;','&#128156;','&#128157;','&#128158;','&#128159;'];
    const colors = ['c0','c1','c2','c3','c4','c5'];

    const gameArea = document.getElementById('game-area');
    const player = document.getElementById('player');
    const playerChar = document.getElementById('player-char');
    const gaugeFill = document.getElementById('gauge-bar-fill');
    const gaugePercent = document.getElementById('gauge-percent');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const endingOverlay = document.getElementById('ending-overlay');
    const endingText = document.getElementById('ending-text');
    const startHint = document.getElementById('start-hint');

    let playerX = window.innerWidth / 2;
    let score = 0;
    const maxScore = 30;
    let gameOver = false;
    let fallingItems = [];
    let gameStarted = false;
    let comboCount = 0;
    let comboTimer = null;

    // 모바일 감지
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isMobile) {
      startHint.innerHTML = '&#9654; 터치해서 움직여 사랑을 받아내!';
    }

    // 키보드
    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (!gameStarted && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
        startGame();
      }
    });
    document.addEventListener('keyup', (e) => { keys[e.key] = false; });

    // 마우스
    document.addEventListener('mousemove', (e) => {
      if (gameOver) return;
      playerX = e.clientX;
      if (!gameStarted) startGame();
    });

    // 터치
    document.addEventListener('touchmove', (e) => {
      if (gameOver) return;
      e.preventDefault();
      playerX = e.touches[0].clientX;
      if (!gameStarted) startGame();
    }, { passive: false });

    document.addEventListener('touchstart', (e) => {
      if (gameOver) return;
      playerX = e.touches[0].clientX;
      if (!gameStarted) startGame();
    }, { passive: false });

    player.style.left = playerX + 'px';

    function startGame() {
      gameStarted = true;
      startHint.style.display = 'none';
      initAudio();
      startBGM();
      startSpawning();
    }

    function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function spawnFalling() {
      if (gameOver) return;
      const isHeart = Math.random() < 0.25;
      const el = document.createElement('div');
      el.className = 'falling-text ' + rnd(colors);

      if (isHeart) {
        el.innerHTML = rnd(hearts);
        el.style.fontSize = (1.5 + Math.random() * 1.5) + 'rem';
        el.style.textShadow = '0 0 10px rgba(255,255,0,0.5)';
      } else {
        el.textContent = rnd(texts);
        el.style.fontSize = clampFont();
      }

      const x = Math.random() * (window.innerWidth - 120) + 20;
      el.style.left = x + 'px';
      el.style.top = '-50px';
      gameArea.appendChild(el);

      const speed = 2 + Math.random() * 2.5;
      fallingItems.push({ el, x, y: -50, speed });
    }

    function clampFont() {
      const base = 0.7 + Math.random() * 0.5;
      return Math.min(base, window.innerWidth < 500 ? 0.8 : 1.2) + 'rem';
    }

    function startSpawning() {
      function tick() {
        if (gameOver) return;
        spawnFalling();
        const interval = Math.max(180, 380 - score * 5);
        setTimeout(tick, interval);
      }
      tick();
    }

    function showCatchEffect(x, y) {
      const ef = document.createElement('div');
      ef.className = 'catch-effect';
      ef.innerHTML = comboCount > 2 ? 'COMBO x' + comboCount + '!' : '+&#10084;';
      ef.style.left = x + 'px';
      ef.style.top = y + 'px';
      gameArea.appendChild(ef);
      setTimeout(() => ef.remove(), 800);

      const fl = document.createElement('div');
      fl.className = 'catch-flash';
      fl.style.left = (x + 30) + 'px';
      fl.style.top = y + 'px';
      gameArea.appendChild(fl);
      setTimeout(() => fl.remove(), 400);
    }

    function updateCombo() {
      comboCount++;
      clearTimeout(comboTimer);
      comboTimer = setTimeout(() => { comboCount = 0; comboEl.classList.remove('show'); }, 1500);
      if (comboCount >= 2) {
        sfxCombo(comboCount);
        comboEl.textContent = 'COMBO x' + comboCount + '!';
        comboEl.classList.remove('show');
        void comboEl.offsetWidth;
        comboEl.classList.add('show');
      }
    }

    function updateGauge() {
      const pct = Math.min(100, Math.floor((score / maxScore) * 100));
      gaugeFill.style.height = pct + '%';
      gaugePercent.textContent = pct + '%';
      gaugeFill.classList.remove('pulse');
      void gaugeFill.offsetWidth;
      gaugeFill.classList.add('pulse');

      if (pct >= 100 && !gameOver) {
        gameOver = true;
        triggerEnding();
      }
    }

    function triggerEnding() {
      stopBGM();
      sfxExplode();
      const gr = document.getElementById('gauge-container').getBoundingClientRect();
      const cx = gr.left + gr.width / 2;
      const cy = gr.top + gr.height / 2;

      for (let i = 0; i < 35; i++) {
        const h = document.createElement('div');
        h.className = 'explode-heart';
        h.innerHTML = rnd(hearts);
        h.style.left = cx + 'px';
        h.style.top = cy + 'px';
        h.style.fontSize = (1.2 + Math.random() * 2.5) + 'rem';
        const angle = (Math.PI * 2 / 35) * i;
        const dist = 150 + Math.random() * 250;
        h.style.setProperty('--ex', Math.cos(angle) * dist + 'px');
        h.style.setProperty('--ey', Math.sin(angle) * dist + 'px');
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1200);
      }

      document.body.style.transition = 'background 0.2s';
      document.body.style.background = '#fff';
      setTimeout(() => { document.body.style.background = ''; }, 200);

      setTimeout(() => {
        endingOverlay.classList.add('show');

        let cnt = 0;
        const rain = setInterval(() => {
          for (let i = 0; i < 6; i++) {
            const h = document.createElement('div');
            h.className = 'ending-heart';
            h.innerHTML = rnd(hearts);
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '-30px';
            h.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
            h.style.animationDuration = (2 + Math.random() * 3) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
          }
          if (++cnt > 120) clearInterval(rain);
        }, 120);

        setTimeout(() => {
          sfxEnding();
          endingText.innerHTML = '&#10084; 이유리 생일 축하해 ! &#10084;<br><br><span style="font-size:clamp(0.9rem,3vw,1.2rem);color:#00FFFF;text-shadow:2px 2px 0 #DA00FF;">세상에서 제일 사랑해</span><br><span style="font-size:clamp(2rem,6vw,3.5rem);">&#128149;&#128149;&#128149;</span>';
        }, 400);
      }, 700);
    }

    const playerSpeed = 8;

    function gameLoop() {
      if (keys['ArrowLeft'] || keys['a']) playerX -= playerSpeed;
      if (keys['ArrowRight'] || keys['d']) playerX += playerSpeed;
      playerX = Math.max(40, Math.min(window.innerWidth - 40, playerX));
      player.style.left = playerX + 'px';

      if (gameOver) {
        fallingItems.forEach(item => item.el.remove());
        fallingItems = [];
        requestAnimationFrame(gameLoop);
        return;
      }

      const catchZoneBottom = window.innerHeight - 15;
      const catchZoneTop = catchZoneBottom - 60;
      const halfW = Math.min(60, window.innerWidth * 0.08);
      const catchLeft = playerX - halfW;
      const catchRight = playerX + halfW;

      for (let i = fallingItems.length - 1; i >= 0; i--) {
        const item = fallingItems[i];
        item.y += item.speed;
        item.el.style.top = item.y + 'px';

        if (item.y > catchZoneTop - 10 && item.y < catchZoneBottom) {
          const ix = item.x + 30;
          if (ix > catchLeft && ix < catchRight) {
            item.el.remove();
            score++;
            scoreEl.textContent = score;
            sfxCatch();
            updateCombo();
            showCatchEffect(item.x, catchZoneTop - 10);
            updateGauge();

            playerChar.textContent = ['(*>w<*)','(*^o^*)','(*/ω\\*)','(*≧▽≦)'][Math.floor(Math.random() * 4)];
            setTimeout(() => { playerChar.textContent = '(*^-^*)'; }, 500);

            fallingItems.splice(i, 1);
            continue;
          }
        }

        if (item.y > window.innerHeight + 50) {
          item.el.remove();
          fallingItems.splice(i, 1);
        }
      }

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
